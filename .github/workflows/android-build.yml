name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            android-viewer/.gradle/caches
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-viewer/**/*.gradle*', 'android-viewer/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Android APK
        run: ./gradlew assembleDebug
        working-directory: android-viewer

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: android-viewer/app/build/outputs/apk/debug/*.apk
