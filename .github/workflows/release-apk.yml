name: Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            android-viewer/.gradle/caches
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-viewer/**/*.gradle*', 'android-viewer/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android-viewer

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +%Y.%m%d).${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: android-viewer/app/build/outputs/apk/release/pc-frame-viewer.apk
